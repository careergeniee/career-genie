  </g>

  <text x="600" y="430" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="700" fill="url(#gold)" letter-spacing="2">Career Genie</text>
  <text x="600" y="478" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#94A3B8" letter-spacing="3">UNLOCK YOUR CAREER POTENTIAL</text>
